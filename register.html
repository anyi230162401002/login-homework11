<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 我的学校系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: url("https://picsum.photos/1920/1080?random=3") no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .register-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header img {
            height: 60px;
            margin-bottom: 10px;
        }
        .header h2 {
            color: #2c3e50;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            color: #34495e;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #27ae60;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #219a52;
        }
        .link-group {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }
        .link-group a {
            color: #27ae60;
            text-decoration: none;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="header">
            <img src="https://picsum.photos/60/60?random=4" alt="校徽">
            <h2>用户注册</h2>
        </div>
        <form>
            <div class="form-group">
                <label>姓名</label>
                <input type="text" placeholder="请输入你的姓名" required>
            </div>
            <div class="form-group">
                <label>学号</label>
                <input type="text" placeholder="请输入你的学号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" placeholder="请设置密码" required>
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" placeholder="请再次输入密码" required>
            </div>
            <button type="button" class="btn">注册</button>
        </form>
        <div class="link-group">
            <a href="login.html">已有账号？去登录</a>
        </div>
        <div class="footer">
            学号：202XXXXXX | 姓名：XXX | © 我的学校风景展示
        </div>
    </div>
</body>
</html>
